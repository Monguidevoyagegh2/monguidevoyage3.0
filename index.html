<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner | Itinerary & Visa Assistant</title>
    <style>
        :root { --primary: #ff5a5f; --dark: #484848; --light: #ffffff; }
        body { font-family: 'Helvetica Neue', sans-serif; background-color: #f7f7f7; color: var(--dark); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: var(--light); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; font-size: 1.8rem; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 25px; }
        #result { display: none; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .links-box { background: #fff8f8; border: 1px solid #ffecec; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .links-box a { color: var(--primary); text-decoration: none; font-weight: bold; display: block; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 AI Travel Assistant</h1>
    <p>Get your custom itinerary and visa requirements in seconds.</p>

    <label>Where do you want to go?</label>
    <input type="text" id="dest" placeholder="e.g. Tokyo, Bali, Rome...">

    <label>Your Passport Nationality:</label>
    <input type="text" id="pass" placeholder="e.g. American, British, French...">

    <label>Budget Level:</label>
    <select id="budget">
        <option value="eco">Budget 🎒</option>
        <option value="standard" selected>Standard 🏨</option>
        <option value="luxury">Luxury ✨</option>
    </select>

    <button onclick="generateTrip()">Generate My Travel Plan</button>

    <div id="result">
        <div id="ai-content">
            <!-- AI will write here -->
        </div>

        <div class="links-box">
            <h4>💡 Recommended Bookings:</h4>
            <!-- 709289 -->
            <a href="https://www.agoda.com" target="_blank">🏨 Book Hotels (Agoda Deals)</a>
            <a href="https://www.klook.com" target="_blank">🎟️ Tours & Activities (Klook)</a>
            <a href="https://airalo.tp.st" target="_blank">📶 Get Local eSIM (Airalo)</a>
            <a href="https://www.ivisa.com" target="_blank">🛂 Check Visa Requirements (iVisa)</a>
        </div>
    </div>
</div>

<script>
    function generateTrip() {
        document.getElementById('result').style.display = 'block';
        document.getElementById('ai-content').innerHTML = "<h3>Analyzing...</h3><p>Connecting to AI tomorrow!</p>";
    }
</script>

</body>
</html>
